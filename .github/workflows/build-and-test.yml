name: build and test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
            dotnet-version: '10.0.x'
      - name: Install dependencies
        run: dotnet ServerPickerX.slnx restore
      - name: Build App
        run: dotnet build ServerPickerX.slnx --no-restore
      - name: Run unit tests (XUnit)
          run: dotnet test ServerPickerX.Tests.slnx --no-build